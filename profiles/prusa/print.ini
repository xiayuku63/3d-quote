; PrusaSlicer default print config for 3D Printing Quoting System
; Bambu Lab A1 0.4mm nozzle equivalent settings

; ── Print ──
layer_height = 0.2
first_layer_height = 0.35
fill_density = 20%
fill_pattern = grid
perimeters = 3
top_shell_layers = 5
bottom_shell_layers = 5
skirt_loops = 1
brim_width = 0
support_material = 0

; ── Speed (Bambu A1) ──
perimeter_speed = 250
external_perimeter_speed = 200
infill_speed = 400
solid_infill_speed = 300
top_solid_infill_speed = 250
gap_fill_speed = 50
bridge_speed = 80
travel_speed = 600
first_layer_speed = 80

; ── Acceleration (A1: X/Y up to 20K mm/s²) ──
default_acceleration = 15000
perimeter_acceleration = 12000
infill_acceleration = 20000
external_perimeter_acceleration = 8000
bridge_acceleration = 5000
first_layer_acceleration = 3000
travel_acceleration = 15000

; ── Machine max limits (A1 factory profile) ──
machine_max_acceleration_x = 20000
machine_max_acceleration_y = 20000
machine_max_acceleration_z = 1500
machine_max_acceleration_e = 5000
machine_max_acceleration_extruding = 20000
machine_max_acceleration_travel = 20000
machine_max_feedrate_x = 500
machine_max_feedrate_y = 500
machine_max_feedrate_z = 30
machine_max_feedrate_e = 30

; ── Retraction (Direct Drive) ──
retract_length = 0.6
retract_speed = 40
deretract_speed = 40
retract_before_travel = 1.5
retract_lift = 0.4
retract_lift_below = 249

; ── Filament (Bambu PLA Basic) ──
filament_diameter = 1.75
filament_density = 1.24
extrusion_multiplier = 0.98
temperature = 220
first_layer_temperature = 220
bed_temperature = 55
first_layer_bed_temperature = 55

; ── No volumetric limit (A1 hotend) ──
max_volumetric_speed = 0

; ── Cooling (minimal time penalty) ──
cooling = 1
fan_always_on = 1
max_fan_speed = 100
min_fan_speed = 35
bridge_fan_speed = 100
disable_fan_first_layers = 1
full_fan_speed_layer = 5
fan_below_layer_time = 0
slowdown_below_layer_time = 0
min_print_speed = 25
