; PrusaSlicer default print config for 3D Printing Quoting System
; Generated for Bambu Lab A1 0.4mm nozzle equivalent settings

; Print settings
layer_height = 0.2
first_layer_height = 0.2
fill_density = 20%
fill_pattern = grid
perimeters = 3
top_shell_layers = 5
bottom_shell_layers = 5
top_shell_thickness = 0.8
bottom_shell_thickness = 0.8
solid_layers = 5

; Skirt and brim
skirt_loops = 1
skirt_distance = 6
brim_width = 0

; Support
enable_support = 0
support_type = normal(auto)
support_material = 0
support_material_angle = 0
support_material_buildplate_only = 0
support_material_contact_distance = 0.2

; Speed
perimeter_speed = 60
small_perimeter_speed = 30
external_perimeter_speed = 50
infill_speed = 80
solid_infill_speed = 80
top_solid_infill_speed = 40
support_material_speed = 60
travel_speed = 130
first_layer_speed = 20

; Cooling
enable_fan = 1
fan_always_on = 1
fan_below_layer_time = 60
slowdown_below_layer_time = 5
min_print_speed = 10

; Quality
resolution = 0.0125
