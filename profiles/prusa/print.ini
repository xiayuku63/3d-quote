; PrusaSlicer default print config for 3D Printing Quoting System
; Bambu Lab A1 0.4mm nozzle equivalent settings
; Based on Bambu Studio factory profile

; ── Print ──
layer_height = 0.2
first_layer_height = 0.35
fill_density = 20%
fill_pattern = grid
perimeters = 3
top_shell_layers = 5
bottom_shell_layers = 5
skirt_loops = 1
brim_width = 0
support_material = 0

; ── Speed (Bambu A1) ──
perimeter_speed = 200
external_perimeter_speed = 150
infill_speed = 300
solid_infill_speed = 250
top_solid_infill_speed = 200
gap_fill_speed = 50
bridge_speed = 60
travel_speed = 500
first_layer_speed = 50

; ── Acceleration (A1: X/Y 12,000 mm/s²) ──
default_acceleration = 10000
perimeter_acceleration = 8000
infill_acceleration = 12000
external_perimeter_acceleration = 5000
bridge_acceleration = 3000
first_layer_acceleration = 2000
travel_acceleration = 12000

; ── Machine max limits (A1 factory: 12K accel, 500mm/s) ──
machine_max_acceleration_x = 12000
machine_max_acceleration_y = 12000
machine_max_acceleration_z = 1500
machine_max_acceleration_e = 5000
machine_max_acceleration_extruding = 12000
machine_max_acceleration_travel = 9000
machine_max_feedrate_x = 500
machine_max_feedrate_y = 500
machine_max_feedrate_z = 30
machine_max_feedrate_e = 30

; ── Retraction (A1 Direct Drive) ──
retract_length = 0.8
retract_speed = 30
deretract_speed = 30
retract_before_travel = 1
retract_lift = 0.4
retract_lift_below = 249

; ── No volumetric limit (A1 hotend: 92mm³) ──
max_volumetric_speed = 0

; ── Cooling (always on for PLA) ──
cooling = 1
fan_always_on = 1
max_fan_speed = 100
min_fan_speed = 35
bridge_fan_speed = 100
disable_fan_first_layers = 1
full_fan_speed_layer = 5
